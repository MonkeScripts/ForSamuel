# Pane → launch file map:
#   sim       — bluerov_sim.launch.py        (Gazebo + ArduSub + MAVROS + ground-truth bridges)
#   controls  — bluerov_controls.launch.py (TFs + locomotion + convert_to_controls_pose + actuators; shared)
#   cluster   — bluerov_cluster.launch.py  (cluster_tf action + service servers; shared)
#   vision    — bluerov_bin_vision.launch.py   (YOLO + image_matching + pose estimators)
#   bt        — bluerov_bin_bt.launch.py       (bluerov_bin_mission_tree)
#
# The bin BT (bluerov_tasks/bins/bins.py) runs ArmAndSetMode as its first leg,
# so no manual arming via QGroundControl is required.

session_name: bluerov_bin_mission
start_directory: /root/HOST/bluerov_ws

environment:
  GZ_VERSION: harmonic

# Session-scoped tmux options. tmuxp applies these before the panes are
# created so history-limit takes effect for every pane. `mouse` is quoted
# so YAML doesn't coerce "on" into a boolean before tmuxp sees it.
options:
  mouse: "on"
  history-limit: 100000

windows:
  - window_name: mission
    layout: tiled
    panes:

      # ── sim ────────────────────────────────────────────────────────────────
      # Brings up everything needed for the vehicle to exist and be reachable:
      #   • Gazebo Harmonic with the RoboSub 2025 pool world (the bin model)
      #   • ArduSub SITL (same firmware that runs on the real BlueROV2)
      #   • MAVROS — ROS 2 ↔ MAVLink bridge (publishes /mavros/local_position/pose,
      #     accepts setpoints on /mavros/setpoint_position/local, broadcasts
      #     MAVLink telemetry on UDP 14550 for QGroundControl on the host)
      #   • ground_truth_to_mavros — feeds Gazebo odom into /mavros/odometry/out
      #     and broadcasts the map→base_link TF
      #   • world_objects_to_markers — publishes world SDF objects as MarkerArray
      - pane_name: sim
        shell_command:
          - source /opt/ros/humble/setup.bash
          - source install/setup.bash
          - ros2 launch bluerov_sim bluerov_sim.launch.py
            world_name:=robosub_2025_pool
            ardusub:=true
            mavros:=true
            gui:=true

      # ── controls ───────────────────────────────────────────────────────────
      # Control-plane services the BT needs to move the vehicle:
      #   • bluerov_tfs.launch.py — static TFs for task frames
      #   • locomotion_action_server — /bluerov/controls Locomotion action server
      #     (publishes 1 Hz setpoints to /mavros/setpoint_position/local)
      #   • convert_to_controls_pose — /bluerov/convert_to_controls_pose service
      #     (handles anchor_frame_name="dropper_link" by subtracting the URDF
      #     dropper offset before returning the goal)
      #   • actuators_stub — /bluerov/actuation/dropper Trigger service
      - pane_name: controls
        shell_command:
          - source /opt/ros/humble/setup.bash
          - source install/setup.bash
          - ros2 launch bluerov_tasks bluerov_controls.launch.py

      - pane_name: cluster
        shell_command:
          - source /opt/ros/humble/setup.bash
          - source install/setup.bash
          - ros2 launch bluerov_tasks bluerov_cluster.launch.py

      - pane_name: vision
        shell_command:
          - source /opt/ros/humble/setup.bash
          - source install/setup.bash
          - ros2 launch bluerov_tasks bluerov_bin_vision.launch.py

      - pane_name: bt
        shell_command:
          - source /opt/ros/humble/setup.bash
          - source install/setup.bash
          - ros2 launch bluerov_tasks bluerov_bin_bt.launch.py
